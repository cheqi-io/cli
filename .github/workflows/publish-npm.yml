name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, for example 0.1.1'
        required: true
        type: string
      dist-tag:
        description: 'npm dist-tag'
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        run: |
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          REQUESTED_VERSION="${{ inputs.version }}"

          if [ "$CURRENT_VERSION" = "$REQUESTED_VERSION" ]; then
            echo "package.json is already at ${REQUESTED_VERSION}"
          else
            npm version "$REQUESTED_VERSION" --no-git-tag-version
          fi

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Check package contents
        run: npm pack --dry-run

      - name: Check published version
        id: npm-version
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="${{ inputs.version }}"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "::error::Package ${PACKAGE_NAME}@${PACKAGE_VERSION} is already published."
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --tag "${{ inputs.dist-tag }}"
